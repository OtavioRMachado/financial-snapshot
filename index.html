<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./icon.svg" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <meta name="theme-color" content="#0b0d12" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes" />
    <link rel="preconnect" href="https://rsms.me/" />
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
    <title>Financial Tracker</title>
    <script>
      // Apply the saved theme class before React mounts to avoid a flash of the
      // wrong palette. Reads the same localStorage entry the app uses.
      (function () {
        try {
          var raw = localStorage.getItem('financial-tracker::v1');
          var pref = 'auto';
          if (raw) {
            var parsed = JSON.parse(raw);
            if (parsed && (parsed.theme === 'light' || parsed.theme === 'dark' || parsed.theme === 'auto')) {
              pref = parsed.theme;
            }
          }
          var isDark =
            pref === 'dark' ||
            (pref === 'auto' &&
              window.matchMedia &&
              window.matchMedia('(prefers-color-scheme: dark)').matches);
          if (isDark) document.documentElement.classList.add('dark');
        } catch (e) {
          /* ignore */
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
